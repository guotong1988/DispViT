exp_name: exp001
num_workers: 8
seed_value: 42
accum_steps: 1
val_epoch_freq: 5

# limit_train_batches: 100
# limit_val_batches: 400

data:
  train:
    _target_: training.data.dataloader.DataLoader
    dataset:
      _target_: training.data.datasets.build_train_dataset
      crop_size: [378, 784]
      spatial_scale: [-0.2, 0.4]
      yjitter: False
      saturation_range: [0, 1.4]
      img_gamma: null
      do_flip: False
      datasets: 
        - sceneflow
      folds: 
        - 1
    num_workers: ${num_workers}
    batch_size: 16
    shuffle: True
    pin_memory: False
  val_dataset_names:
    - things
  val:
    _target_: training.data.dataloader.DataLoader
    num_workers: ${num_workers}
    batch_size: 1
    shuffle: True
    pin_memory: False
  
logging:
  log_dir: logs
  log_freq: 10
  log_level_primary: DEBUG
  log_level_secondary: WARNING
  all_ranks: False
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - loss_disp
        - loss_logits
    val:
      keys_to_log:
        - loss_objective
        - loss_disp
        - loss_logits
      
checkpoint:
  save_dir: logs/${exp_name}/ckpts
  save_freq: 5
  resume_checkpoint_path: null
  strict: True

loss:
  _target_: training.loss.DispLoss
  disp:
    weight: 0.1
  logits:
    weight: 1.0

optim:
  param_group_modifiers: False

  optimizer:
    _target_: torch.optim.AdamW
    lr: 1e-4
    weight_decay: 0.05

  frozen_module_names: null

  amp:
    enabled: True
    amp_dtype: bfloat16
  gradient_clip:
    _target_: training.train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["pretrained"]
        max_norm: 1.0  # feel free to reduce this if see instabilities
        norm_type: 2
      - module_name: ["depth_head"]
        max_norm: 1.0  # feel free to reduce this if see instabilities
        norm_type: 2
  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-8
              end_value: 1e-4
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: 1e-4
              end_value: 1e-8
          lengths: [0.05, 0.95]
          interval_scaling: ['rescaled', 'rescaled']
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.05

max_epochs: 67

model:
  _target_: dispvit.models.dispvit.DispViT
  encoder_type: vitb
  init_weights: True

distributed:
  # check https://docs.pytorch.org/docs/stable/generated/torch.nn.parallel.DistributedDataParallel.html for options
  backend: nccl
  comms_dtype: None
  find_unused_parameters: True
  timeout_mins: 30
  gradient_as_bucket_view: True  # Less memory used
  bucket_cap_mb: 25
  broadcast_buffers: True

cuda:
  cudnn_deterministic: False
  cudnn_benchmark: False
  allow_tf32: True
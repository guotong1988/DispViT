defaults:
  - default
  - _self_

exp_name: sf_refinenet

data:
  train:
    batch_size: 32
    dataset:
      crop_size: [392, 784]

model:
  _target_: dispvit.models.refinenet.RefineNet
  regressor:
    _target_: dispvit.models.dispvit.DispViT
    encoder_type: vitl
  regressor_pretrained_path: logs/sf_rvc_finetune/checkpoint.pt
  extractor:
    _target_: dispvit.models.extractor.ConvNextExtractor
    output_dim: 128
    stochastic_depth_prob: 0.2
    _init_weights: True
  embed_dim: 128
  num_blocks: 5
  window_size: 6
  num_heads: 4
  mlp_ratio: 4
  drop: 0
  attn_drop: 0
  drop_path: 0
  return_intermediate: True

max_epochs: 67

loss:
  _target_: training.loss.RefineLoss
  disp:
    weight: [0.7, 0.7, 0.8, 1.0, 1.0]
  loss_type: l1

logging:
  log_dir: logs
  log_freq: 10
  log_level_primary: DEBUG
  log_level_secondary: WARNING
  all_ranks: False
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - loss_disp
        - loss_disp_0
        - loss_disp_1
        - loss_disp_2
        - loss_disp_3
    val:
      keys_to_log:
        - loss_objective
        - loss_disp

optim:
  frozen_module_names: ["regressor"]

  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-7
              end_value: 5e-4
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: 5e-4
              end_value: 1e-7
          lengths: [0.05, 0.95]
          interval_scaling: ['rescaled', 'rescaled']
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.05

  gradient_clip:
    _target_: training.train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["extractor"]
        max_norm: 1.0  # feel free to reduce this if see instabilities
        norm_type: 2
      - module_name: ["head"]
        max_norm: 1.0  # feel free to reduce this if see instabilities
        norm_type: 2
      - module_name: ["concatconv"]
        max_norm: 1.0  # feel free to reduce this if see instabilities
        norm_type: 2
      - module_name: ["gw"]
        max_norm: 1.0  # feel free to reduce this if see instabilities
        norm_type: 2
      - module_name: ["ffn"]
        max_norm: 1.0  # feel free to reduce this if see instabilities
        norm_type: 2
      - module_name: ["norm"]
        max_norm: 1.0  # feel free to reduce this if see instabilities
        norm_type: 2
      - module_name: ["blocks"]
        max_norm: 1.0  # feel free to reduce this if see instabilities
        norm_type: 2